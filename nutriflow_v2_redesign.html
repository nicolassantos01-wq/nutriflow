<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#2b3f1c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>NutriFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --g9:#1c2b12; --g8:#2b3f1c; --g7:#3e5a2a; --g6:#527439;
  --g5:#658d49; --g4:#7ea960; --g3:#a4c48d; --g2:#c9ddbb; --g1:#e4efdc; --g0:#f4f8f1;
  --ink:#211d14; --ink2:#5a5140; --ink3:#8f8570; --line:#e6e0d1; --cream:#faf7f0;
  --amber:#c16c33; --amber-bg:#f9f1eb; --rose:#af3b34; --rose-bg:#faeae7;
  --r:18px; --rm:14px; --rs:10px;
  --sh:0 1px 8px rgba(28,43,18,.07),0 2px 18px rgba(28,43,18,.05);
  --sh2:0 6px 28px rgba(28,43,18,.14);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(160deg,#e6e0cd,#d6d5bd);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100dvh;}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-optical-sizing:auto;margin:0;}
button,input,select{font-family:inherit;}
button{cursor:pointer;border:none;background:none;padding:0;}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}

/* ── SHELL ── */
.shell{max-width:390px;margin:0 auto;min-height:100dvh;background:var(--cream);position:relative;box-shadow:0 0 60px rgba(28,43,18,.22);padding-bottom:84px;overflow-x:hidden;}
@media(min-width:431px){body{padding:28px 0;}.shell{min-height:calc(100dvh - 56px);border-radius:32px;overflow:hidden;}}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:10;background:rgba(247,249,245,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:15px 20px 13px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:19px;font-weight:700;letter-spacing:-.2px;}
.topbar .act{font-size:12.5px;font-weight:700;color:var(--g5);display:flex;align-items:center;gap:4px;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:rgba(247,249,245,.97);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:20;}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink3);font-size:9.5px;font-weight:600;padding:4px 2px;border-radius:12px;letter-spacing:.1px;}
.ntab.on{color:var(--g6);}
.ntab .ni{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.ntab.on .ni{background:var(--g1);color:var(--g6);}

/* ── HERO ── */
.hero{background:linear-gradient(145deg,var(--g5) 0%,var(--g8) 100%);padding:22px 20px 26px;color:#fff;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:190px;height:190px;border-radius:44% 56% 60% 40%/48% 42% 58% 52%;background:rgba(255,255,255,.055);}
.hero::after{content:'';position:absolute;bottom:-70px;left:-30px;width:220px;height:220px;border-radius:52% 48% 40% 60%/54% 46% 54% 46%;background:rgba(0,0,0,.08);}
.grain{position:absolute;inset:0;opacity:.5;mix-blend-mode:overlay;pointer-events:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/></svg>");}
.hero-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
.hero-greet small{display:block;font-size:12px;opacity:.7;letter-spacing:.2px;}
.hero-greet strong{display:block;font-size:23px;font-weight:700;letter-spacing:-.4px;margin-top:1px;}
.av{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;font-family:'Fraunces',Georgia,serif;}
.streak-strip{margin-top:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;position:relative;z-index:1;}
.streak-strip .sf{font-size:20px;flex-shrink:0;}
.streak-strip .st{flex:1;}
.streak-strip .st b{display:block;font-size:13px;font-weight:700;}
.streak-strip .st span{font-size:11px;opacity:.7;margin-top:1px;display:block;}
.streak-strip .sv{font-size:18px;font-weight:800;font-family:'Fraunces',Georgia,serif;}
.meal-track{margin-top:18px;position:relative;z-index:1;}
.mtrack-row{display:flex;justify-content:space-between;gap:6px;}
.mtab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px 2px;}
.mdot{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;position:relative;border:2px solid rgba(255,255,255,.12);}
.mdot.done{background:rgba(255,255,255,.92);color:var(--g6);}
.mdot.now{border-color:var(--amber);box-shadow:0 0 0 3px rgba(212,146,10,.22);}
.mdot .ck{position:absolute;bottom:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--g4);border:2px solid #fff;display:flex;align-items:center;justify-content:center;}
.mlbl{font-size:10.5px;font-weight:600;opacity:.88;}
.mtime{font-size:9.5px;opacity:.6;}

/* ── SECTIONS ── */
.sec{padding:18px 20px 4px;}
.sec h2{font-size:13.5px;font-weight:700;margin-bottom:10px;color:var(--ink);letter-spacing:-.1px;}
.sec .sh{font-size:11.5px;color:var(--ink2);margin:-6px 0 10px;line-height:1.5;}

/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh);}
.card.green{background:var(--g0);border-color:var(--g2);}

/* ── MOOD ── */
.mood-row{display:flex;gap:7px;}
.mb{flex:1;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:11px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--ink3);transition:.18s;}
.mb.on{border-color:var(--g4);background:var(--g0);color:var(--g6);}
.mood-msg{margin-top:10px;background:var(--amber-bg);color:#7a4020;border-radius:var(--rs);padding:11px 13px;font-size:12.5px;font-weight:500;line-height:1.55;border:1px solid rgba(193,108,51,.18);}

/* ── SUGG CARD ── */
.sugg{display:flex;gap:12px;align-items:flex-start;}
.sugg-ic{width:48px;height:48px;border-radius:14px;background:var(--g1);color:var(--g6);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sugg-body{flex:1;min-width:0;}
.sugg-body b{font-size:14.5px;display:block;font-weight:700;letter-spacing:-.1px;}
.sugg-body .d{font-size:11.5px;color:var(--g5);font-weight:600;margin-top:2px;}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
.tag{font-size:10.5px;font-weight:600;background:#fff;border:1px solid var(--g2);color:var(--g6);padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
.macro{font-size:11px;color:var(--ink3);margin-top:7px;}

/* ── BAR / BUDGET ── */
.pbar{height:6px;background:var(--g1);border-radius:8px;overflow:hidden;margin-top:10px;}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--g3),var(--g6));border-radius:8px;transition:width .4s ease;}
.pbar.amber i{background:linear-gradient(90deg,#e0a06a,var(--amber));}
.pbar.rose i{background:linear-gradient(90deg,#d68680,var(--rose));}

/* ── MEAL ROW ── */
.mrow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh);}
.mrow.now{border-color:rgba(212,146,10,.5);background:#fffdf5;}
.mic{width:38px;height:38px;border-radius:11px;background:var(--g0);color:var(--g6);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mmid{flex:1;min-width:0;}
.mmid .tl{font-size:10.5px;color:var(--ink3);font-weight:700;letter-spacing:.2px;text-transform:uppercase;}
.mmid .nm{font-size:13.5px;font-weight:600;color:var(--ink);margin-top:2px;}
.mmid .mt{font-size:11px;color:var(--ink3);margin-top:2px;}
.mchk{width:27px;height:27px;border-radius:50%;border:1.8px solid var(--line);display:flex;align-items:center;justify-content:center;color:transparent;flex-shrink:0;background:#fff;transition:.18s;}
.mchk.on{background:var(--g5);border-color:var(--g5);color:#fff;}

/* ── RECIPE GRID ── */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rmini{background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:13px;text-align:left;display:flex;flex-direction:column;gap:8px;box-shadow:var(--sh);}
.rmini .ri{width:38px;height:38px;border-radius:11px;background:var(--g0);color:var(--g6);display:flex;align-items:center;justify-content:center;}
.rmini .rn{font-size:12.5px;font-weight:600;line-height:1.35;color:var(--ink);}
.rmini .rm{font-size:10.5px;color:var(--ink3);font-weight:500;}
.feat-card{background:linear-gradient(145deg,var(--g0) 0%,#fff 100%);border:1px solid var(--g2);border-radius:var(--r);padding:16px;width:100%;text-align:left;box-shadow:var(--sh);}
.feat-eye{display:inline-flex;align-items:center;gap:5px;background:#fff;color:var(--g6);font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid var(--g2);}
.feat-card h3{font-size:16.5px;margin:10px 0 3px;letter-spacing:-.2px;}
.feat-card .d{font-size:12px;color:var(--ink2);}

/* ── CHIP ROW ── */
.chips{display:flex;gap:7px;overflow-x:auto;padding:12px 20px 6px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 15px;border-radius:20px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--ink2);white-space:nowrap;transition:.15s;}
.chip.on{background:var(--g6);border-color:var(--g6);color:#fff;}
.search-w{position:relative;}
.search-w input{width:100%;padding:11px 14px 11px 38px;border-radius:12px;border:1.5px solid var(--line);font-size:13.5px;background:#fff;outline:none;color:var(--ink);}
.search-w input::placeholder{color:var(--ink3);}
.search-w input:focus{border-color:var(--g4);}
.search-w .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink3);}

/* ── WEEK STRIP ── */
.wstrip{display:flex;gap:5px;}
.wpill{flex:1;min-width:36px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.15s;}
.wpill .wd{font-size:9px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.wpill .wn{font-size:14px;font-weight:700;font-family:'Fraunces',Georgia,serif;}
.wpill.on{background:var(--g6);border-color:var(--g6);}
.wpill.on .wd,.wpill.on .wn{color:#fff;}
.wdots{display:flex;gap:6px;}
.wdot{flex:1;height:6px;border-radius:6px;background:var(--line);}
.wdot.f{background:var(--g5);}
.wdot.p{background:var(--amber);}

/* ── CHALLENGES ── */
.bcard{background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:9px;box-shadow:var(--sh);}
.bic{width:40px;height:40px;border-radius:11px;background:var(--g0);color:var(--g6);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bmid{flex:1;min-width:0;}
.bmid b{font-size:13px;font-weight:700;color:var(--ink);}
.bmid .d{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.4;}
.bpct{font-size:11px;font-weight:700;color:var(--g5);flex-shrink:0;}

/* ── PROFILE ── */
.phead{display:flex;flex-direction:column;align-items:center;padding:20px 20px 10px;text-align:center;}
.pav{width:76px;height:76px;border-radius:50%;background:linear-gradient(145deg,var(--g4),var(--g8));color:#fff;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',Georgia,serif;box-shadow:0 4px 18px rgba(43,63,28,.3);}
.phead h2{font-size:18px;margin:13px 0 3px;letter-spacing:-.2px;}
.phead .ps{font-size:12px;color:var(--ink3);}
.stats{display:flex;gap:8px;padding:12px 20px 4px;}
.sc{flex:1;background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:13px 8px;text-align:center;box-shadow:var(--sh);}
.sc .v{font-size:16px;font-weight:700;color:var(--g6);font-family:'Fraunces',Georgia,serif;}
.sc .l{font-size:9.5px;color:var(--ink3);margin-top:3px;line-height:1.3;font-weight:500;}
.srow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh);}
.sic{width:36px;height:36px;border-radius:10px;background:var(--g0);color:var(--g6);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.smid{flex:1;min-width:0;}
.smid b{font-size:13px;font-weight:600;display:block;color:var(--ink);}
.smid .v{font-size:11.5px;color:var(--ink3);margin-top:2px;}

/* ── RECIPE SHEET ── */
.ovback{position:fixed;inset:0;background:rgba(5,18,10,.55);z-index:40;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.sheet{width:100%;max-width:390px;background:#fff;border-radius:24px 24px 0 0;max-height:90dvh;overflow-y:auto;animation:slideUp .22s ease-out;padding-bottom:28px;}
@keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.shead{position:sticky;top:0;background:#fff;padding:13px 18px 0;display:flex;justify-content:flex-end;z-index:2;}
.sclose{width:32px;height:32px;border-radius:50%;background:var(--g0);color:var(--g6);display:flex;align-items:center;justify-content:center;}
.shero{padding:4px 22px 0;text-align:center;}
.shero .sic{width:64px;height:64px;border-radius:18px;background:var(--g0);color:var(--g6);display:flex;align-items:center;justify-content:center;margin:0 auto 13px;}
.shero h3{font-size:19px;margin:0 0 4px;letter-spacing:-.2px;}
.shero .d{font-size:12.5px;color:var(--ink3);}
.nstrip{display:flex;justify-content:space-around;background:var(--g0);border-radius:var(--rm);margin:14px 20px 0;padding:13px 4px;}
.nstrip .nv{font-size:14px;font-weight:700;color:var(--g6);font-family:'Fraunces',Georgia,serif;}
.nstrip .nl{font-size:10px;color:var(--ink3);margin-top:2px;}
.ssec{padding:16px 22px 0;}
.ssec h4{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--ink);}
ul.ings{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
ul.ings li{font-size:13px;display:flex;align-items:center;gap:9px;color:var(--ink);}
ul.ings li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--g4);flex-shrink:0;}
ul.steps{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;}
ul.steps li{display:flex;gap:11px;font-size:13px;line-height:1.55;color:var(--ink);}
.sn{width:23px;height:23px;border-radius:50%;background:var(--g5);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}

/* ── VIDEOS ── */
.vtab-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:12px 20px 0;}
.vtab-row::-webkit-scrollbar{display:none;}
.vtab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--ink2);}
.vtab.on{background:var(--g6);border-color:var(--g6);color:#fff;}
.vcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh);}
.vthumb{width:100%;height:164px;background:linear-gradient(145deg,var(--g2),var(--g0));display:flex;align-items:center;justify-content:center;position:relative;}
.vplay{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;color:var(--g6);box-shadow:0 4px 18px rgba(0,0,0,.18);}
.vthumb .vdur{position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,.65);color:#fff;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;}
.vthumb .vcat{position:absolute;top:8px;left:10px;background:var(--g6);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.vinfo{padding:13px 15px;}
.vinfo b{font-size:14px;display:block;font-weight:700;color:var(--ink);letter-spacing:-.1px;}
.vinfo .vm{font-size:11.5px;color:var(--ink3);margin-top:4px;display:flex;align-items:center;gap:10px;}

/* ── EXERCISE MODULE ── */
.sub-nav{display:flex;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:49px;z-index:9;overflow-x:auto;scrollbar-width:none;}
.sub-nav::-webkit-scrollbar{display:none;}
.stab{flex:0 0 auto;padding:11px 13px;font-size:11.5px;font-weight:700;color:var(--ink3);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;}
.stab.on{color:var(--g6);border-color:var(--g5);}

/* rings */
.rings-w{display:flex;align-items:center;justify-content:center;position:relative;width:176px;height:176px;margin:0 auto;flex-shrink:0;}
.rings-w svg{overflow:visible;}
.rleg{display:flex;flex-direction:column;gap:10px;justify-content:center;}
.rli{display:flex;align-items:center;gap:7px;font-size:12px;}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* bar chart */
.bchart{display:flex;align-items:flex-end;gap:5px;height:68px;}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bfill{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--g3),var(--g6));min-height:4px;}
.bfill.e{background:var(--g1);}
.blbl{font-size:9.5px;font-weight:700;color:var(--ink3);}

/* sync cards */
.syncc{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:13px 14px;box-shadow:var(--sh);margin-bottom:10px;}
.syncl{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.syncm{flex:1;}
.syncm b{font-size:13.5px;display:block;font-weight:600;}
.syncm span{font-size:11.5px;color:var(--ink3);}
.sbtn{padding:7px 13px;border-radius:9px;border:1.5px solid var(--g4);background:var(--g0);color:var(--g6);font-size:12px;font-weight:700;white-space:nowrap;}

/* activity feed */
.acard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:11px;box-shadow:var(--sh);}
.ahead{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.aem{width:44px;height:44px;border-radius:13px;background:var(--g0);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ameta{flex:1;}
.ameta b{font-size:14px;font-weight:700;color:var(--ink);}
.ameta span{font-size:11px;color:var(--ink3);display:block;margin-top:2px;}
.astats{display:flex;border-top:1px solid var(--line);padding-top:12px;}
.astat{flex:1;text-align:center;}
.astat:not(:last-child){border-right:1px solid var(--line);}
.astat .v{font-size:15px;font-weight:700;display:block;color:var(--ink);font-family:'Fraunces',Georgia,serif;}
.astat .l{font-size:10px;color:var(--ink3);margin-top:2px;display:block;}
.aroute{width:100%;height:88px;border-radius:12px;background:linear-gradient(150deg,var(--g1),var(--g0));margin-bottom:12px;overflow:hidden;position:relative;}
.aroute svg{width:100%;height:100%;}
.akudos{display:flex;align-items:center;gap:14px;border-top:1px solid var(--line);padding-top:11px;margin-top:12px;}
.kbtn{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--ink3);transition:.15s;}
.kbtn.on{color:var(--amber);}
.kbtn .num{color:inherit;}
.cbtn{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink3);}
.pr-flag{display:inline-flex;align-items:center;gap:4px;background:var(--amber-bg);color:var(--amber);font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-left:auto;}

/* exercise history (hevy-style) */
.ehist{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:11px;box-shadow:var(--sh);}
.ehist-h{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
.ehist-h .en{flex:1;font-size:14px;font-weight:700;color:var(--ink);}
.ehist-h .ev{font-size:15px;font-weight:700;color:var(--g6);font-family:'Fraunces',Georgia,serif;}
.eset-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);}
.eset-row:first-of-type{border-top:none;}
.eset-row .ed{font-size:11px;color:var(--ink3);width:64px;flex-shrink:0;}
.eset-row .ew{font-size:13px;font-weight:600;color:var(--ink);flex:1;}
.eset-row .pr-flag{margin-left:0;}

/* workout list */
.wcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:17px;margin-bottom:11px;box-shadow:var(--sh);}
.whead{display:flex;align-items:center;gap:13px;margin-bottom:13px;}
.wem{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.wmeta{flex:1;}
.wmeta b{font-size:15px;display:block;font-weight:700;color:var(--ink);letter-spacing:-.1px;}
.wmeta span{font-size:12px;color:var(--ink3);}
.echips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.echip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--g0);color:var(--g6);border:1px solid var(--g2);}

/* active workout */
.awt{min-height:100dvh;background:var(--cream);display:flex;flex-direction:column;padding-bottom:130px;}
.awtbar{background:var(--g8);color:#fff;padding:18px 20px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;}
.awtbar h2{font-size:17px;font-weight:700;margin-bottom:2px;}
.awtbar span{font-size:11px;opacity:.7;}
.tbadge{background:rgba(255,255,255,.14);border-radius:10px;padding:7px 12px;font-size:15px;font-weight:800;letter-spacing:.5px;font-family:'Fraunces',Georgia,serif;}
.sethist{padding:14px 20px 0;}
.sethist p{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin:0 0 7px;}
.setrow{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#fff;border:1px solid var(--line);border-radius:11px;margin-bottom:6px;}
.setnum{width:22px;height:22px;border-radius:50%;background:var(--g5);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.setrow .dt{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--g5);background:var(--g0);padding:2px 9px;border-radius:20px;}
.stepper-card{margin:14px 20px 0;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.stepper-card .slbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:11px;display:block;}
.srow2{display:flex;gap:14px;}
.stepper{flex:1;display:flex;align-items:center;justify-content:space-between;background:var(--g0);border-radius:12px;padding:10px 8px;}
.sval{text-align:center;}
.sval b{display:block;font-size:22px;font-weight:800;font-family:'Fraunces',Georgia,serif;color:var(--ink);}
.sval small{font-size:11px;color:var(--ink3);}
.sbtnS{width:34px;height:34px;border-radius:9px;background:#fff;color:var(--g6);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);flex-shrink:0;}
.nsbtn{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:350px;padding:15px;border-radius:16px;background:linear-gradient(135deg,var(--g4),var(--g7));color:#fff;font-size:15px;font-family:'Fraunces',Georgia,serif;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 24px rgba(43,63,28,.32);}

/* progress / analytics */
.aic{background:linear-gradient(145deg,var(--g6),var(--g9));border-radius:var(--r);padding:20px;margin-bottom:13px;color:#fff;}
.aic .eye{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;opacity:.65;margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.aic h3{font-size:17px;font-weight:800;margin:0 0 5px;letter-spacing:-.2px;}
.aic .ds{font-size:12.5px;opacity:.8;line-height:1.55;margin:0 0 13px;}
.apills{display:flex;gap:7px;flex-wrap:wrap;}
.apill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:5px 11px;font-size:11.5px;font-weight:600;}
.cbar{height:5px;background:rgba(255,255,255,.16);border-radius:5px;margin:13px 0 5px;overflow:hidden;}
.cbar i{display:block;height:100%;background:var(--amber);border-radius:5px;}
.clbl{font-size:10.5px;opacity:.65;display:flex;justify-content:space-between;}
.musr{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.musr .mn{font-size:12.5px;font-weight:600;width:68px;flex-shrink:0;color:var(--ink);}
.mbg{flex:1;height:8px;background:var(--g1);border-radius:8px;overflow:hidden;}
.mfill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--g3),var(--g5));transition:width .5s ease;}
.mpct{font-size:11px;font-weight:700;color:var(--g5);width:34px;text-align:right;}
.prrow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh);}
.prrow .prem{font-size:22px;flex-shrink:0;}
.prrow .prm{flex:1;}
.prrow .prm b{font-size:13.5px;display:block;font-weight:600;}
.prrow .prm span{font-size:11px;color:var(--ink3);}
.prrow .prv{font-size:16px;font-weight:800;color:var(--g6);font-family:'Fraunces',Georgia,serif;}

/* chatbot */
.chat-w{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.chat-h{background:linear-gradient(135deg,var(--g6),var(--g9));padding:14px 16px;display:flex;align-items:center;gap:10px;color:#fff;}
.chat-hic{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-h b{font-size:13px;display:block;font-weight:700;}
.chat-h span{font-size:11px;opacity:.75;}
.chat-msgs{padding:13px 13px 0;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.bai{background:var(--g0);border:1px solid var(--g2);border-radius:4px 14px 14px 14px;padding:10px 12px;font-size:12.5px;line-height:1.55;color:var(--ink);max-width:88%;align-self:flex-start;}
.buser{background:var(--g5);color:#fff;border-radius:14px 4px 14px 14px;padding:10px 12px;font-size:12.5px;line-height:1.55;max-width:88%;align-self:flex-end;}
.bts{font-size:9.5px;opacity:.55;margin-top:3px;}
.chat-in{display:flex;gap:8px;padding:11px 13px;border-top:1px solid var(--line);align-items:center;}
.chat-in input{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:9px 12px;font-size:13px;outline:none;background:var(--g0);color:var(--ink);}
.chat-in input:focus{border-color:var(--g4);}
.chat-send{width:36px;height:36px;border-radius:10px;background:var(--g5);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── BUTTONS ── */
.btn{padding:13px 18px;border-radius:13px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn-p{background:linear-gradient(135deg,var(--g4),var(--g7));color:#fff;box-shadow:0 3px 14px rgba(43,63,28,.26);}
.btn-g{background:#fff;border:1.5px solid var(--line);color:var(--ink);}
.btn-o{width:100%;background:#fff;border:1.5px solid var(--rose);color:var(--rose);border-radius:var(--rm);padding:13px;font-size:13.5px;font-weight:700;}

/* ── ADD MEAL MODAL ── */
.pmrow{display:flex;gap:7px;}
.pb{flex:1;padding:9px 3px 8px;border-radius:11px;border:2px solid var(--line);background:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--ink2);}
.pb.on{border-color:var(--g5);background:var(--g0);color:var(--g7);}

/* ── CAMERA ── */
#camov{position:fixed;inset:0;z-index:50;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .2s;}
#camv{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cmask{position:absolute;background:rgba(0,0,0,.55);z-index:1;}
.ctgt{position:absolute;z-index:2;width:216px;height:216px;top:50%;left:50%;transform:translate(-50%,-50%);}
.ctgt::before,.ctgt::after,.cbl,.cbr{content:'';position:absolute;width:26px;height:26px;border-color:var(--g3);border-style:solid;}
.ctgt::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.ctgt::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.cbr{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
.cbl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.cscan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--g3),transparent);animation:scan 2s ease-in-out infinite;z-index:3;}
@keyframes scan{0%{top:0;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:100%;opacity:0;}}
.clbl{position:absolute;z-index:2;top:calc(50% + 120px);left:50%;transform:translateX(-50%);color:rgba(255,255,255,.75);font-size:12.5px;font-weight:600;white-space:nowrap;}
.chdr{position:absolute;top:0;left:0;right:0;z-index:2;padding:calc(16px + env(safe-area-inset-top)) 20px 18px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,.55),transparent);}
.chdr span{color:#fff;font-size:14px;font-weight:700;}
.cftr{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:18px 28px calc(24px + env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:11px;background:linear-gradient(0deg,rgba(0,0,0,.65),transparent);}

/* ── ONBOARDING ── */
.ob-step{min-height:100dvh;display:flex;flex-direction:column;background:linear-gradient(165deg,var(--g0) 0%,var(--cream) 50%,#e3e2c9 100%);padding:0 0 36px;}
.ob-hdr{padding:calc(52px + env(safe-area-inset-top)) 28px 24px;text-align:center;}
.ob-logo{width:64px;height:64px;border-radius:22px;background:linear-gradient(145deg,var(--g4),var(--g8));display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 6px 22px rgba(30,42,20,.28);}
.ob-hdr h1{font-size:22px;font-weight:800;color:var(--g8);margin:0 0 8px;letter-spacing:-.4px;line-height:1.25;}
.ob-hdr p{font-size:13.5px;color:var(--ink2);margin:0;line-height:1.55;}
.ob-prog{display:flex;gap:6px;justify-content:center;margin-bottom:6px;}
.op{height:4px;flex:1;max-width:44px;border-radius:4px;background:var(--line);}
.op.on{background:var(--g5);}
.ob-body{flex:1;padding:0 22px;}
.ob-lbl{display:block;font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3);margin-bottom:7px;}
.ob-input{width:100%;padding:13px 15px;border-radius:13px;border:1.8px solid var(--line);font-size:15px;color:var(--ink);background:#fff;outline:none;box-sizing:border-box;transition:border-color .18s;}
.ob-input:focus{border-color:var(--g4);}
.gcard{width:100%;text-align:left;border-radius:15px;padding:13px 15px;border:1.8px solid var(--line);background:#fff;display:flex;align-items:center;gap:13px;box-shadow:var(--sh);transition:.18s;cursor:pointer;margin-bottom:9px;}
.gcard.on{border-color:var(--g4);background:var(--g0);box-shadow:0 0 0 3px rgba(46,125,79,.12);}
.gcard .gem{font-size:26px;flex-shrink:0;}
.gcard .gm{flex:1;}
.gcard .gm b{font-size:14px;font-weight:700;display:block;color:var(--ink);}
.gcard .gm span{font-size:12px;color:var(--ink3);margin-top:2px;display:block;line-height:1.4;}
.gcheck{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;color:transparent;flex-shrink:0;transition:.18s;}
.gcard.on .gcheck{background:var(--g4);border-color:var(--g4);color:#fff;}
.row2{display:flex;gap:10px;margin-bottom:14px;}
.finput{flex:1;display:flex;flex-direction:column;gap:5px;}
.row3{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.freq-btn{padding:12px 8px;border-radius:13px;border:1.8px solid var(--line);background:#fff;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ink3);cursor:pointer;transition:.18s;}
.freq-btn .fe{font-size:22px;}
.freq-btn.on{border-color:var(--g4);background:var(--g0);color:var(--g6);}

/* ── LOGIN ── */
.login-w{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(160deg,var(--g0),var(--cream) 55%,#e3e2c9);padding:32px 26px;box-sizing:border-box;}
.lcard{width:100%;max-width:360px;background:#fff;border-radius:24px;padding:28px 24px 22px;box-shadow:var(--sh2);border:1px solid var(--line);}
.linput{width:100%;padding:12px 14px 12px 38px;border-radius:12px;border:1.5px solid var(--line);font-size:14px;color:var(--ink);background:var(--g0);outline:none;box-sizing:border-box;transition:.18s;}
.linput:focus{border-color:var(--g4);background:#fff;}
.linput-w{position:relative;margin-bottom:13px;}
.linput-w .li{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink3);}

/* ── TOAST ── */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(8px);max-width:360px;width:88%;background:var(--g8);color:#fff;padding:11px 16px;border-radius:13px;font-size:12.5px;font-weight:600;z-index:70;opacity:0;transition:.22s;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.22);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── UTILS ── */
.view{animation:fadeIn .18s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.empty{text-align:center;padding:48px 20px;color:var(--ink3);}
.empty .ei{font-size:40px;margin-bottom:10px;}
.empty b{display:block;color:var(--ink);font-size:14px;margin-bottom:5px;}
.sep{height:1px;background:var(--line);margin:4px 0;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>

function toast(msg){
  let el=document.getElementById('__toast');
  if(!el){el=document.createElement('div');el.id='__toast';el.className='toast';document.body.appendChild(el);}
  el.innerHTML=ic('check',14,2.4)+'<span>'+msg+'</span>';
  requestAnimationFrame(()=>el.classList.add('show'));
  clearTimeout(window.__tt);
  window.__tt=setTimeout(()=>el.classList.remove('show'),2600);
}

function calcTDEE(){
  const w=parseFloat(S.user.weight)||70,h=parseFloat(S.user.height)||170,a=parseFloat(S.user.age)||24;
  const tmb=10*w+6.25*h-5*a+5;
  const f={iniciante:1.375,moderado:1.55,avancado:1.725}[S.user.frequency]||1.375;
  S.user.tdee=Math.round(tmb*f);
  S.calorieGoal=S.user.tdee||2000;
}

function stopCam(){
  if(window.__cam){window.__cam.getTracks().forEach(t=>t.stop());window.__cam=null;}
  clearTimeout(window.__scanT);
}

function saveLS(){
  try{
    localStorage.setItem('nf_user',JSON.stringify(S.user));
    localStorage.setItem('nf_ob',S.isOnboarded?'1':'');
    localStorage.setItem('nf_wh',JSON.stringify(S.workoutHistory));
    localStorage.setItem('nf_kcalb',S.caloriesBurned);
    localStorage.setItem('nf_kcalc',S.caloriesConsumed);
  }catch(e){}
}
function loadLS(){
  try{
    const u=localStorage.getItem('nf_user');if(u)S.user={...S.user,...JSON.parse(u)};
    if(localStorage.getItem('nf_ob')==='1'){S.isOnboarded=true;S.isLoggedIn=true;}
    const wh=localStorage.getItem('nf_wh');if(wh)S.workoutHistory=JSON.parse(wh);
    const kb=localStorage.getItem('nf_kcalb');if(kb)S.caloriesBurned=+kb;
    const kc=localStorage.getItem('nf_kcalc');if(kc)S.caloriesConsumed=+kc;
  }catch(e){}
}

function viewReceitas(){
  const feat=rById('bowl-frango');
  const filtered=RECIPES.filter(r=>{
    if(r.id===feat.id) return false;
    if(S.recipeFilter==='15min'&&r.min>15) return false;
    if(S.recipeFilter==='5reais'&&r.price>5) return false;
    if(S.recipeFilter==='veg'&&!r.tags.includes('veg')) return false;
    if(S.recipeSearch){const q=S.recipeSearch.toLowerCase();if(!r.name.toLowerCase().includes(q)&&!r.desc.toLowerCase().includes(q))return false;}
    return true;
  });
  const chips=[['todos','Todos'],['15min','Até 15 min'],['5reais','Até R$5'],['veg','Vegetariano']].map(([k,l])=>`<button class="chip ${S.recipeFilter===k?'on':''}" data-action="rfilt" data-k="${k}">${l}</button>`).join('');

    <div class="ri">${ic(r.icon,17)}</div>
    <div class="rn">${r.name}</div>
    <div class="rm num">${r.min} min · ${brl(r.price)}</div>
  </button>`).join('');
  const featOk=!S.recipeSearch&&S.recipeFilter==='todos';
  return `<div class="view">

/* ── PLANO ── */
function viewPlano(){
  buildPlano();
  const days=S.weekDays.map((d,i)=>`<button class="wpill ${S.selectedDay===i?'on':''}" data-action="selday" data-i="${i}">
    <span class="wd">${d.d}</span><span class="wn num">${d.n}</span>
  </button>`).join('');
  const day=S.plano[S.selectedDay];
  const cur=day.findIndex(m=>!m.done);
  const calC=day.filter(m=>m.done).reduce((s,m)=>s+(rById(m.rid)?.kcal||0),0);
  const cpct=Math.min(100,Math.round(calC/S.calorieGoal*100));
  const mrows=day.map((m,i)=>{
    const r=rById(m.rid)||{name:'Refeição',min:0,kcal:0};
    return `<div class="mrow ${i===cur&&!m.done?'now':''}">
      <div class="mic">${ic(iconFor(m.label),17)}</div>
      <div class="mmid" data-action="open-recipe" data-id="${r.id||m.rid}" style="cursor:pointer;">
        <div class="tl num">${m.time}${i===cur&&!m.done?' — agora':''}</div>
        <div class="nm">${r.name}</div>
        <div class="mt num">${r.min} min · ${r.kcal} kcal</div>
      </div>
      <button class="mchk ${m.done?'on':''}" data-action="toggle-plano" data-i="${i}">${ic('check',13,2.4)}</button>
    </div>`;
  }).join('');
  const dots=S.plano.map(p=>`<div class="wdot ${p.every(m=>m.done)?'f':p.some(m=>m.done)?'p':''}"></div>`).join('');
  return `<div class="view">

function routeSvg(seed){
  let s=(seed%9973)+11;
  const pts=[[8,44+((s%18)-9)]];
  for(let i=1;i<7;i++){
    s=(s*9301+49297)%233280;
    pts.push([8+i*47,18+(s/233280)*52]);
  }
  const d=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const dots=`<circle cx="${pts[0][0]}" cy="${pts[0][1]}" r="4" fill="var(--g6)"/><circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="4" fill="var(--amber)"/>`;
  return `<svg viewBox="0 0 300 88" preserveAspectRatio="none"><path d="${d}" fill="none" style="stroke:var(--g5)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}
function bestKgFor(name,excludeId){
  let mx=0;
  S.workoutHistory.forEach(a=>{if(a.id===excludeId||!a.exSets)return;a.exSets.forEach(s=>{if(s.name===name&&s.kg>mx)mx=s.kg;});});
  return mx;
}
function viewWFeed(){
  if(!S.workoutHistory.length) return `<div class="empty"><div class="ei">🏃</div><b>Nenhuma atividade ainda</b><p>Registe o primeiro treino.</p></div>`;
  const totalK=S.workoutHistory.reduce((s,a)=>s+a.kcal,0);
  const totalM=S.workoutHistory.reduce((s,a)=>s+a.tempo,0);
  const cards=S.workoutHistory.map(a=>{
    const stats=[a.dist?{v:a.dist+' km',l:'Distância'}:null,a.dist?{v:(a.tempo/a.dist).toFixed(1)+' min/km',l:'Ritmo'}:null,{v:a.tempo+' min',l:'Duração'},{v:a.kcal+' kcal',l:'Calorias'}].filter(Boolean);
    const isPR=a.exSets&&a.exSets.some(s=>s.kg>=bestKgFor(s.name,a.id)&&s.kg>0&&bestKgFor(s.name,a.id)>0);
    return `<div class="acard">
      <div class="ahead"><div class="aem">${a.emoji}</div><div class="ameta"><b>${a.tipo}</b><span>${a.data}</span></div>
        ${isPR?'<span class="pr-flag">'+ic('trophy',11,2.4)+' PR</span>':`<div style="padding:4px 9px;border-radius:20px;background:var(--g0);color:var(--g7);font-size:10.5px;font-weight:700;">${ic('check',11,2.4)} feito</div>`}
      </div>
      ${a.dist?`<div class="aroute">${routeSvg(a.id)}</div>`:''}
      <div class="astats">${stats.map(s=>`<div class="astat"><span class="v num">${s.v}</span><span class="l">${s.l}</span></div>`).join('')}</div>
      <div class="akudos">
        <button class="kbtn ${a.liked?'on':''}" data-action="kudos" data-id="${a.id}">${ic('star',15,a.liked?2.4:1.8)} <span class="num">${a.kudos} kudos</span></button>
      </div>
    </div>`;
  }).join('');
  return `<div style="padding:16px 20px 32px;">
  <div style="display:flex;gap:8px;margin-bottom:16px;">
    ${[[S.workoutHistory.length,'atividades'],[Math.floor(totalM/60)+'h '+(totalM%60)+'min','no total'],[totalK+' kcal','queimadas']].map(([v,l])=>`
    <div style="flex:1;background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:11px 6px;text-align:center;box-shadow:var(--sh);">
      <div style="font-size:13px;font-weight:700;color:var(--g7);" class="num">${v}</div>
      <div style="font-size:10px;color:var(--ink2);margin-top:2px;">${l}</div>
    </div>`).join('')}
  </div>
  ${cards}
  </div>`;
}


function viewWHistorico(){
  const names=[...new Set(WORKOUTS.flatMap(w=>w.exercises.map(e=>e.name)))];
  const hasAny=S.workoutHistory.some(a=>a.exSets&&a.exSets.length);
  if(!hasAny) return `<div class="empty"><div class="ei">🏋️</div><b>Ainda sem histórico</b><p>Termina um treino para veres o teu progresso por exercício aqui.</p></div>`;
  const cards=names.map(name=>{
    const sessions=[];
    S.workoutHistory.forEach(a=>{
      if(!a.exSets) return;
      const setsForEx=a.exSets.filter(s=>s.name===name);
      if(!setsForEx.length) return;
      const best=setsForEx.reduce((m,s)=>s.kg>m.kg?s:m,setsForEx[0]);
      sessions.push({data:a.data,kg:best.kg,reps:best.reps});
    });
    if(!sessions.length) return '';
    const maxKg=Math.max(...sessions.map(s=>s.kg));
    const rows=sessions.slice(0,4).map(s=>`<div class="eset-row"><span class="ed">${s.data}</span><span class="ew num">${s.kg} kg × ${s.reps}</span>${s.kg===maxKg?'<span class="pr-flag">'+ic('trophy',10,2.6)+' PR</span>':''}</div>`).join('');
    return `<div class="ehist">
      <div class="ehist-h"><span class="en">${name}</span><span class="ev num">${maxKg} kg</span></div>
      ${rows}
    </div>`;
  }).filter(Boolean).join('');
  return `<div style="padding:16px 20px 32px;">
    <p style="font-size:13px;color:var(--ink2);margin:0 0 15px;line-height:1.5;">O teu recorde por exercício, como no Hevy. Cada treino concluído atualiza esta lista.</p>

  </div>`;
}

function viewWProgress(){
  if(!S.chatMsgs) S.chatMsgs=buildChatMsgs();
  const goal=S.user.goal||'saude';
  const gl={perder_peso:'Perda de Peso 🔥',ganhar_massa:'Ganho de Massa 💪',manter:'Manutenção ⚖️',saude:'Saúde Geral 🌿'}[goal]||'Saúde Geral 🌿';
  const totalK=S.workoutHistory.reduce((s,a)=>s+a.kcal,0);
  const nrecs={perder_peso:['🥗 Défice de 300 kcal/dia','💧 2.5L de água','🚫 Evitar açúcar à noite'],ganhar_massa:['🥩 +30g proteína pós-treino','💧 3L de água','⚡ +300 kcal no almoço'],manter:['⚖️ Manter macros habituais','💧 2L de água','🍌 Fruta antes do treino'],saude:['🥦 5 porções de veg','💧 2L de água','😴 8h de sono']}[goal]||['💧 Mantém-te hidratado','🥗 Alimentação equilibrada'];
  const pct=Math.min(98,60+S.workoutHistory.length*8);

  <div style="display:flex;gap:9px;margin-bottom:13px;">
    <div style="flex:1;background:#fff;border:1px solid var(--line);border-radius:var(--rm);padding:13px 8px;text-align:center;box-shadow:var(--sh);">
      <div style="font-size:21px;">💧</div><div style="font-size:10.5px;color:var(--ink3);font-weight:600;text-transform:uppercase;margin:3px 0;">Hidratação</div>
      <div style="font-size:15px;font-weight:800;" class="num">2.1 / 3L</div>
    </div>

      <div style="font-size:15px;font-weight:800;color:var(--amber);" class="num">+${totalK} kcal</div>

  <div class="card" style="margin-bottom:13px;">
    <p style="font-size:13px;font-weight:700;margin:0 0 14px;">💪 Músculos Trabalhados</p>${mrows}

    <p style="font-size:13px;font-weight:700;margin:0 0 11px;">🏆 Recordes Pessoais</p>${prrows}

    <div class="chat-h"><div class="chat-hic">${ic('leaf',15,2)}</div><div><b>Coach NutriFlow</b><span>Responde em segundos</span></div><div style="margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--g3);flex-shrink:0;"></div></div>

function buildChatMsgs(){
  const goal=S.user.goal||'saude';
  const gl={ganhar_massa:'Ganho de Massa',perder_peso:'Perda de Peso',manter:'Manutenção',saude:'Saúde Geral'}[goal];
  const totalK=S.workoutHistory.reduce((s,a)=>s+a.kcal,0);
  const msgs=[
    {r:'ai',t:`Olá, ${S.user.name||'atleta'}! Analisei os teus dados de treino. 🧠`},
    {r:'ai',t:`Objetivo de <b>${gl}</b> detectado. Gasto calórico acumulado: <b>${totalK} kcal</b>.`},
    {r:'ai',t:goal==='ganhar_massa'?'Consome 30–40g de proteína nas 2h após o treino. Tenta o frango grelhado ou whey com banana. 💪':goal==='perder_peso'?'Mantém o défice de ~300 kcal/dia. Evita ultraprocessados após o treino.':'Mantém a consistência! 3–4 treinos/semana com boa hidratação é o ideal.'},
  ];
  return msgs;
}

   RENDER
══════════════════════════════════════ */
const TABS=[
  {key:'home',label:'Início',icon:'home'},
  {key:'plano',label:'Plano',icon:'cal'},
  {key:'receitas',label:'Receitas',icon:'fork'},
  {key:'exercicios',label:'Exercícios',icon:'gym'},
  {key:'perfil',label:'Perfil',icon:'user'},
];
function viewFor(t){
  if(t==='home') return viewHome();
  if(t==='receitas') return viewReceitas();
  if(t==='videos') return viewVideos();
  if(t==='plano') return viewPlano();
  if(t==='desafios') return viewDesafios();
  if(t==='educacao') return viewEducacao();
  if(t==='exercicios') return viewExercicios();
  if(t==='perfil') return viewPerfil();
  return '';
}
function render(){
  const app=document.getElementById('app');
  if(!S.isLoggedIn){app.innerHTML=viewLogin();attach();return;}
  if(!S.isOnboarded){app.innerHTML=viewOnboarding();attach();return;}
  const nav=TABS.map(t=>`<button class="ntab ${S.tab===t.key?'on':''}" data-action="go" data-tab="${t.key}"><span class="ni">${ic(t.icon,20,S.tab===t.key?2.2:1.8)}</span><span>${t.label}</span></button>`).join('');
  app.innerHTML=viewFor(S.tab)+`<div class="bnav">${nav}</div>`;
  if(S.isCameraActive) renderCamera(); else document.getElementById('__cam')?.remove();
  if(S.isAddingMeal) renderMealModal(); else document.getElementById('__meal')?.remove();
  renderSheet();
  attach();
  // scroll chat to bottom
  setTimeout(()=>{const b=document.getElementById('chat-box');if(b)b.scrollTop=b.scrollHeight;},50);
}

/* ══════════════════════════════════════
   ATTACH DYNAMIC LISTENERS
══════════════════════════════════════ */
function attach(){
  const rs=document.querySelector('[data-action="rsearch"]');
  if(rs) rs.addEventListener('input',e=>{S.recipeSearch=e.target.value;const c=e.target.selectionStart;render();const n=document.querySelector('[data-action="rsearch"]');if(n){n.focus();n.setSelectionRange(c,c);}});
  const ci=document.getElementById('chat-in');
  if(ci) ci.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendChat();}});
  const si=document.getElementById('s-in');
  if(si) si.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const btn=document.querySelector('[data-action="save-s"]');if(btn)btn.click();}});
}

/* ══════════════════════════════════════
   CLICK HANDLER
══════════════════════════════════════ */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]');
  if(!t) return;
  const a=t.dataset.action;

  /* ─ NAV ─ */
  if(a==='go'){S.tab=t.dataset.tab;render();window.scrollTo({top:0,behavior:'smooth'});}
  else if(a==='go-videos'){S.tab='videos';render();window.scrollTo({top:0});}
  else if(a==='go-perfil'){S.tab='perfil';render();window.scrollTo({top:0});}
  else if(a==='go-educacao'){S.tab='educacao';render();window.scrollTo({top:0});}
  else if(a==='toggle-edu'){
    const id=t.dataset.id;
    if(S.eduDone.includes(id)) S.eduDone=S.eduDone.filter(x=>x!==id);
    else{S.eduDone=[...S.eduDone,id];toast('Boa! Mais uma lição concluída.');}
    saveLS();render();
  }
  else if(a==='watch-video'){const yt=t.dataset.yt||t.closest('[data-yt]')?.dataset.yt;if(yt)window.open(yt,'_blank');}
  else if(a==='go-receitas'){S.tab='receitas';render();window.scrollTo({top:0});}
  else if(a==='wtab'){S.workoutTab=t.dataset.k;render();}

  /* ─ AUTH ─ */
  else if(a==='login'){
    const email=document.getElementById('l-email')?.value.trim();
    const pass=document.getElementById('l-pass')?.value.trim();
    if(!email||!pass){toast('Preenche todos os campos!');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('E-mail inválido.');return;}
    if(pass.length<6){toast('Senha deve ter pelo menos 6 caracteres.');return;}
    S.isLoggedIn=true;
    S.user.email=email;
    if(!S.user.name){S.user.name=email.split('@')[0];S.user.initials=email.slice(0,2).toUpperCase();}
    render();
  }
  else if(a==='forgot'){toast('Funcionalidade em breve. Para já usa qualquer senha com 6+ caracteres.');}
  else if(a==='go-register'){toast('Cadastro: usa qualquer e-mail e senha para entrar.');document.getElementById('l-email')?.focus();}
  else if(a==='logout'){S.isLoggedIn=false;S.isOnboarded=false;S.obStep=1;S.obGoal='';S.obFreq='';try{localStorage.clear();}catch(x){}render();}

  /* ─ ONBOARDING ─ */
  else if(a==='sel-goal'){S.obGoal=t.dataset.k;render();}
  else if(a==='sel-freq'){S.obFreq=t.dataset.k;render();}
  else if(a==='ob-next'){
    if(S.obStep===1){
      const name=document.getElementById('ob-name')?.value.trim();
      if(!name){toast('Como te chamas?');return;}
      if(!S.obGoal){toast('Escolhe um objetivo para continuar.');return;}
      S.user.name=name.charAt(0).toUpperCase()+name.slice(1);
      S.user.initials=name.slice(0,2).toUpperCase();
      S.user.goal=S.obGoal;
      S.obStep=2;render();
    } else if(S.obStep===2){
      const w=document.getElementById('ob-weight')?.value.trim();
      const h=document.getElementById('ob-height')?.value.trim();
      const ag=document.getElementById('ob-age')?.value.trim();
      if(!w||!h||!ag){toast('Preenche o peso, altura e idade.');return;}
      if(!S.obFreq){toast('Escolhe a tua frequência de treino.');return;}
      S.user.weight=w;S.user.height=h;S.user.age=ag;S.user.frequency=S.obFreq;
      S.obStep=3;render();
    } else if(S.obStep===3){
      ['cafe','almoco','lanche','jantar'].forEach(k=>{
        const v=document.getElementById('ob-'+k)?.value;if(v)S.user.mealTimes[k]=v;
      });
      S.obStep=4;render();
    }
  }
  else if(a==='ob-back'){if(S.obStep>1){S.obStep--;render();}}
  else if(a==='ob-finish'){
    const bud=parseFloat(document.getElementById('ob-budget')?.value);
    if(bud&&bud>0){
      S.obBudget=bud;
      S.user.budgetMonthly=bud;
      S.budget.goal=Math.round(bud/4.3);
      S.budget.spent=0;
    }
    calcTDEE();
    S.isOnboarded=true;
    saveLS();
    buildPlano();
    toast(`Bem-vindo, ${S.user.name}! O teu plano está pronto.`);
    render();
  }

  /* ─ HOME ─ */
  else if(a==='mood'){S.selectedMood=t.dataset.k;render();}
  else if(a==='toggle-today'){
    const m=S.todayMeals.find(x=>x.key===t.dataset.key);
    if(m){m.done=!m.done;if(m.done){const r=rById(m.rid);if(r)S.caloriesConsumed+=r.kcal;}else{const r=rById(m.rid);if(r)S.caloriesConsumed=Math.max(0,S.caloriesConsumed-r.kcal);}toast(m.done?'Refeição marcada!':'Refeição desmarcada.');render();}
  }

  /* ─ RECIPES ─ */
  else if(a==='rfilt'){S.recipeFilter=t.dataset.k;render();}
  else if(a==='vfilt'){S.videoFilter=t.dataset.k;render();}
  else if(a==='open-recipe'){S.openRecipe=t.dataset.id;renderSheet();}
  else if(a==='close-recipe'){S.openRecipe=null;renderSheet();}
  else if(a==='mark-done'){
    const r=rById(t.dataset.id);
    if(r){S.budget.spent=+(S.budget.spent+r.price).toFixed(2);S.recipesCooked++;S.caloriesConsumed+=r.kcal;saveLS();}
    S.openRecipe=null;toast('Receita marcada como feita.');render();
  }
  else if(a==='watch-recipe'){const rid=t.dataset.id;const vid=VIDEOS.find(v=>v.rid===rid);const rec=rById(rid);const yt=vid?vid.yt:'https://www.youtube.com/results?search_query='+encodeURIComponent((rec?.name||'receita saudável')+' receita');window.open(yt,'_blank');}

  /* ─ PLANO ─ */
  else if(a==='selday'){S.selectedDay=+t.dataset.i;render();}
  else if(a==='toggle-plano'){
    buildPlano();
    const m=S.plano[S.selectedDay][+t.dataset.i];
    m.done=!m.done;
    toast(m.done?'Refeição concluída!':'Marcação removida.');render();
  }
  else if(a==='edit-plano'){
    buildPlano();
    const day=S.plano[S.selectedDay];
    const undone=day.filter(m=>!m.done);
    if(!undone.length){toast('Todas as refeições já estão marcadas!');return;}
    const m=undone[Math.floor(Math.random()*undone.length)];
    const alts=RECIPES.filter(r=>r.id!==m.rid);
    m.rid=alts[Math.floor(Math.random()*alts.length)].id;
    toast('Refeição substituída por uma alternativa.');render();
  }

  /* ─ MEAL MODAL ─ */
  else if(a==='add-activity'||a==='add-meal'){S.isAddingMeal=true;render();}
  else if(a==='close-meal'){S.isAddingMeal=false;S.newMealNome='';S.newMealKcal='';S.newMealPeriodo='';document.getElementById('__meal')?.remove();}
  else if(a==='sel-periodo'){S.newMealPeriodo=t.dataset.k;document.getElementById('__meal')?.remove();renderMealModal();}
  else if(a==='save-meal'){
    const nome=document.getElementById('m-nome')?.value.trim();
    const kcal=document.getElementById('m-kcal')?.value.trim();
    if(!nome){toast('Dá um nome à refeição!');return;}
    if(!kcal){toast('Indica as calorias.');return;}
    if(!S.newMealPeriodo){toast('Escolhe o período.');return;}
    buildPlano();
    const timeMap={cafe:S.user.mealTimes.cafe||'07:00',almoco:S.user.mealTimes.almoco||'12:00',lanche:S.user.mealTimes.lanche||'15:30',jantar:S.user.mealTimes.jantar||'19:00'};
    S.plano[S.selectedDay].push({time:timeMap[S.newMealPeriodo],label:nome,rid:'maca-amendoim',done:false,_custom:true,_kcal:+kcal});
    S.caloriesConsumed+=+kcal;
    S.isAddingMeal=false;S.newMealNome='';S.newMealKcal='';S.newMealPeriodo='';
    toast(`"${nome}" adicionada ao plano!`);render();
  }

  /* ─ CAMERA ─ */
  else if(a==='open-camera'){
    if(!navigator.mediaDevices?.getUserMedia){toast('Câmara não suportada neste browser.');return;}
    S.isCameraActive=true;render();
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}})
    .then(stream=>{
      window.__cam=stream;
      const v=document.getElementById('camv');
      if(!v){stopCam();return;}
      v.srcObject=stream;
      window.__scanT=setTimeout(()=>{
        stopCam();
        buildPlano();
        S.plano[S.selectedDay].push({time:'—',label:'Alimento escaneado',rid:'arroz-feijao',done:false,_custom:true,_kcal:320});
        S.isCameraActive=false;
        toast('Alimento identificado e adicionado ao plano.');
        render();
      },3500);
    })
    .catch(err=>{
      stopCam();S.isCameraActive=false;
      toast(err.name==='NotAllowedError'?'Permissão da câmara negada.':err.name==='NotFoundError'?'Nenhuma câmara encontrada.':'Não foi possível aceder à câmara.');
      render();
    });
  }
  else if(a==='close-cam'){stopCam();S.isCameraActive=false;render();}

  /* ─ WORKOUTS ─ */
  else if(a==='start-w'){
    const w=WORKOUTS.find(x=>x.id===t.dataset.wid);if(!w)return;
    const fx=w.exercises[0];
    S.activeWorkout={id:w.id,label:w.label,exercises:w.exercises,curEx:0,curSet:0,kg:fx.kgDef,reps:fx.reps,sets:[],elapsed:0};
    clearInterval(window.__wt);
    window.__wt=setInterval(()=>{
      if(!S.activeWorkout) return;
      S.activeWorkout.elapsed++;
      const el=document.querySelector('.tbadge');
      if(el){const m=String(Math.floor(S.activeWorkout.elapsed/60)).padStart(2,'0'),s2=String(S.activeWorkout.elapsed%60).padStart(2,'0');el.textContent=`${m}:${s2}`;}
    },1000);
    S.workoutTab='treinos';render();
  }
  else if(a==='inc-weight'){if(S.activeWorkout){S.activeWorkout.kg=+(S.activeWorkout.kg+2.5).toFixed(1);render();}}
  else if(a==='dec-weight'){if(S.activeWorkout){S.activeWorkout.kg=+Math.max(0,S.activeWorkout.kg-2.5).toFixed(1);render();}}
  else if(a==='inc-reps'){if(S.activeWorkout){S.activeWorkout.reps++;render();}}
  else if(a==='dec-reps'){if(S.activeWorkout){S.activeWorkout.reps=Math.max(1,S.activeWorkout.reps-1);render();}}
  else if(a==='next-set'){
    const w=S.activeWorkout;if(!w)return;
    const ex=w.exercises[w.curEx];
    w.sets.push({ei:w.curEx,kg:w.kg,reps:w.reps});
    const lastSet=w.curSet+1>=ex.sets,lastEx=w.curEx===w.exercises.length-1;
    if(lastSet&&lastEx){
      clearInterval(window.__wt);
      const mins=Math.floor(w.elapsed/60),kcal=Math.round(w.sets.length*12);
      S.caloriesBurned+=kcal;
      S.workoutHistory.unshift({id:Date.now(),tipo:w.label,emoji:WORKOUTS.find(x=>x.id===w.id)?.emoji||'🏋️',dist:null,tempo:mins,kcal,data:'Agora mesmo',kudos:0,liked:false,
        exSets:w.sets.map(s=>({name:w.exercises[s.ei].name,kg:s.kg,reps:s.reps}))});
      S.activeWorkout=null;saveLS();
      toast(`Treino concluído — +${kcal} kcal queimadas`);
      S.workoutTab='progresso';S.chatMsgs=null;render();
    } else if(lastSet){
      w.curEx++;w.curSet=0;const nx=w.exercises[w.curEx];w.kg=nx.kgDef;w.reps=nx.reps;
      toast(`Próximo: ${nx.name}`);render();
    } else {w.curSet++;render();}
  }
  else if(a==='abandon-w'){clearInterval(window.__wt);S.activeWorkout=null;toast('Treino abandonado. Retoma quando quiseres.');render();}
  else if(a==='kudos'){
    const id=+t.dataset.id;const act=S.workoutHistory.find(x=>x.id===id);
    if(act){act.liked=!act.liked;act.kudos+=act.liked?1:-1;render();}
  }
  else if(a==='sync-app'){
    const app=t.dataset.app==='strava'?'Strava':'Hevy';
    t.textContent='✓ Ligado';t.style.cssText='padding:7px 12px;border-radius:8px;background:var(--g6);color:#fff;font-size:12px;font-weight:700;border:none;';
    toast(`${app} ligado com sucesso.`);
  }

  /* ─ CHAT ─ */
  else if(a==='send-chat'){sendChat();}

  /* ─ PROFILE ─ */
  else if(a==='edit-s'){
    const k=t.dataset.k;
    if(k==='goal-lbl'||k==='notif'||k==='sobre'){toast(k==='sobre'?'NutriFlow v2.0 · Projeto educacional.':'Em breve!');return;}
    if(S.editKey===k){return;}S.editKey=k;render();
  }
  else if(a==='save-s'){
    const k=t.dataset.k,v=document.getElementById('s-in')?.value.trim();
    if(v){
      if(k==='meta'){const n=+v;if(n>300)S.calorieGoal=n;}
      if(k==='orç'){const n=+v;if(n>0){S.user.budgetMonthly=n;S.budget.goal=Math.round(n/4.3);}}
    }
    S.editKey=null;saveLS();toast('Preferência atualizada!');render();
  }
});

/* ══════════════════════════════════════
   CHAT FUNCTION
══════════════════════════════════════ */
function sendChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp?.value.trim();if(!msg)return;
  if(!S.chatMsgs)S.chatMsgs=buildChatMsgs();
  S.chatMsgs.push({r:'user',t:msg});
  render();
  setTimeout(()=>{
    const l=msg.toLowerCase();
    let r='Boa pergunta! Com base nos teus dados, recomendo manter a consistência e ajustar a alimentação ao teu objetivo. 🌿';
    if(l.includes('proteína')||l.includes('protein'))r='Aponta para 1.6–2.2g de proteína por kg/dia. Ovo, frango e feijão são óptimas fontes no NutriFlow! 🥩';
    else if(l.includes('dorm')||l.includes('sono'))r='O sono é o teu treino invisível! 7–9h por noite aumentam a recuperação muscular em até 40%. 😴';
    else if(l.includes('cardio')||l.includes('corr'))r='Para ganho de massa, limita o cardio a 2–3x/sem de baixa intensidade. Para perda de peso, 30 min diários já fazem diferença! 🏃';
    else if(l.includes('água')||l.includes('hidrat'))r='A tua meta de hidratação é 35ml por kg de peso. Num dia de treino, adiciona +500ml. 💧';
    else if(l.includes('supino')||l.includes('peito'))r='O teu recorde no Supino é 100kg! Para progredir, aumenta 2.5kg a cada 2 semanas com sobrecarga progressiva. 🏋️';
    else if(l.includes('emagrec')||l.includes('perder'))r='Défice calórico de 300–500 kcal/dia é o mais eficaz e sustentável. O NutriFlow já calculou o teu TDEE para isso! 🎯';
    S.chatMsgs.push({r:'ai',t:r});render();
    setTimeout(()=>{const b=document.getElementById('chat-box');if(b)b.scrollTop=b.scrollHeight;},50);
  },900);
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
loadLS();
buildPlano();
render();
</script>
